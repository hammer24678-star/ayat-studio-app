name: ayat_studio_app
description: Ayat Studio — Quran video editing and ayah detection, native APK.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  file_picker: ^8.0.0
  video_player: ^2.9.1
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  ffmpeg_kit_flutter_new: ^4.1.0
  whisper_ggml_plus: ^1.3.0
  speech_to_text: ^7.0.0
  http: ^1.2.1
  share_plus: ^12.0.0
  google_fonts: ^6.2.1
  media_store_plus: ^0.1.3 # PATCH_S25_SAVE_TO_DOWNLOADS: publish exports to the public Download folder
  shared_preferences: ^2.2.2 # PATCH_S37_PERSISTENT_SETTINGS: remember style/effect choices across sessions

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/quran/
    - assets/icon/
  # PATCH_S46_DEFAULT_FONT_AND_GLOW: bundled default ayah font (place the .ttf file at
  # assets/fonts/Elgharib-NoonHafs.ttf -- not committed by this script).
  fonts:
    - family: ElgharibNoonHafs
      fonts:
        - asset: assets/fonts/Elgharib-NoonHafs.ttf
    # PATCH_S100_FONTS_SPINSTAR_TINT: two more bundled ayah fonts, copied in
    # from the phone's Download/Telegram folder by this patch script.
    - family: TharwatEmara
      fonts:
        - asset: assets/fonts/TharwatEmara.ttf
    - family: DigitalMadinaNON
      fonts:
        - asset: assets/fonts/DigitalMadinaNON.ttf

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  # NOTE: assets/models/ is intentionally NOT bundled — ggml-base.bin is
  # ~141MB and GitHub rejects any pushed file over 100MB. WhisperService
  # downloads and caches it on first run instead (see whisper_service.dart).
