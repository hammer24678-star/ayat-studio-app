name: Build APK

on:
  push:
    branches:
      - main
      - 'claude/**'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Ensure ASR model is published to a GitHub Release (fetched once from the official whisper.cpp/HF source on the runner — which has unrestricted network access — and re-hosted here so the app on-device downloads from github.com instead of reaching huggingface.co directly, which is unreachable on at least one tester's network)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TAG=models
          ASSET=ggml-small.bin # PATCH_S41_UPGRADE_ASR_MODEL: was ggml-base.bin
          URL="https://huggingface.co/ggerganov/whisper.cpp/resolve/main/$ASSET"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "ASR model assets" \
              --notes "Whisper GGML models re-hosted here so the on-device app fetches from github.com instead of huggingface.co. Source: https://huggingface.co/ggerganov/whisper.cpp"
          fi
          if gh release view "$TAG" --json assets -q '.assets[].name' | grep -qx "$ASSET"; then
            echo "$ASSET already attached to release $TAG — skipping re-upload"
          else
            curl -fL -o "$ASSET" "$URL"
            gh release upload "$TAG" "$ASSET"
          fi

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: stable

      - name: Generate platform folders (android/ etc.) if missing
        run: flutter create --platforms=android --org com.ayatstudio --project-name ayat_studio_app .

      - name: Diagnose root-level Android Gradle files (app-level compileSdk=36 doesn't propagate to plugin subprojects like file_picker — need to see the actual generated root build.gradle(.kts)/settings.gradle(.kts) before writing the subprojects-wide fix)
        run: |
          echo "=== android/ directory listing ==="
          ls -la android/
          echo
          echo "=== android/build.gradle.kts (if present) ==="
          cat android/build.gradle.kts 2>/dev/null || echo "NOT FOUND"
          echo
          echo "=== android/build.gradle (if present) ==="
          cat android/build.gradle 2>/dev/null || echo "NOT FOUND"
          echo
          echo "=== android/settings.gradle.kts (if present) ==="
          cat android/settings.gradle.kts 2>/dev/null || echo "NOT FOUND"
          echo
          echo "=== android/settings.gradle (if present) ==="
          cat android/settings.gradle 2>/dev/null || echo "NOT FOUND"

      - name: Dedupe ffmpeg-kit-full-gpl / ffmpeg-kit-min native libs (both bundle the same .so files, e.g. libavcodec.so, which Gradle's native-lib merge refuses to pick between on its own)
        run: |
          if [ -f android/app/build.gradle.kts ]; then
            sed -i '/^android {/a\    packaging { jniLibs { pickFirsts += "**/*.so" } }' android/app/build.gradle.kts
          elif [ -f android/app/build.gradle ]; then
            sed -i "/^android {/a\\    packagingOptions { jniLibs { pickFirsts += ['**/*.so'] } }" android/app/build.gradle
          else
            echo "Neither build.gradle.kts nor build.gradle found under android/app/" >&2
            exit 1
          fi

      - name: Exclude ffmpeg-kit-min transitive dependency (whisper_ggml pulls in ffmpeg_kit_flutter_new_min, which bundles the same com.antonkarpenko.ffmpegkit.* classes as our direct ffmpeg_kit_flutter_new full-gpl dependency — full-gpl is a superset, so it's safe to drop min)
        run: |
          if [ -f android/app/build.gradle.kts ]; then
            sed -i '/^android {/i\configurations.all { exclude(group = "com.antonkarpenko", module = "ffmpeg-kit-min") }' android/app/build.gradle.kts
          elif [ -f android/app/build.gradle ]; then
            sed -i "/^android {/i\\configurations.all { exclude group: 'com.antonkarpenko', module: 'ffmpeg-kit-min' }" android/app/build.gradle
          else
            echo "Neither build.gradle.kts nor build.gradle found under android/app/" >&2
            exit 1
          fi

      - name: Force compileSdk 36 across all Android plugin subprojects (flutter.compileSdkVersion resolves to android-34 in this Flutter SDK version but flutter_plugin_android_lifecycle requires >=36; app-level compileSdk only affects :app, not plugin subprojects like file_picker)
        run: |
          if ! grep -q 'FORCE_COMPILESDK_36' android/build.gradle.kts; then
            {
              echo ''
              echo '// FORCE_COMPILESDK_36 -- override compileSdk for every Android plugin subproject.'
              echo '// Guarded on state.executed because the templates existing'
              echo '// "subprojects { project.evaluationDependsOn(\":app\") }" block forces :app to'
              echo '// evaluate early, so by the time this runs for :app, afterEvaluate would throw'
              echo '// "Cannot run Project.afterEvaluate(Action) when the project is already evaluated."'
              echo 'subprojects {'
              echo '    val applyCompileSdk: (org.gradle.api.Project) -> Unit = { p ->'
              echo '        p.extensions.findByType(com.android.build.gradle.BaseExtension::class.java)?.let { ext ->'
              echo '            ext.compileSdkVersion(36)'
              echo '        }'
              echo '    }'
              echo '    if (project.state.executed) {'
              echo '        applyCompileSdk(project)'
              echo '    } else {'
              echo '        afterEvaluate { applyCompileSdk(project) }'
              echo '    }'
              echo '}'
            } >> android/build.gradle.kts
          fi
          echo "-- tail of android/build.gradle.kts:"
          tail -25 android/build.gradle.kts

      - name: Pin NDK version required by whisper_ggml, minSdk required by ffmpeg_kit_flutter_new v4.x, compileSdk 36 required by flutter_plugin_android_lifecycle
        run: |
          if [ -f android/app/build.gradle.kts ]; then
            sed -i 's/ndkVersion = flutter.ndkVersion/ndkVersion = "29.0.13113456"/' android/app/build.gradle.kts
            sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 24/' android/app/build.gradle.kts
            sed -i -E 's/^([[:space:]]*)compileSdk[[:space:]]*=.*/\1compileSdk = 36/' android/app/build.gradle.kts
            grep -q 'compileSdk = 36' android/app/build.gradle.kts || sed -i '/^android {/a\    compileSdk = 36' android/app/build.gradle.kts
            echo "-- resulting compileSdk line(s):"; grep -n 'compileSdk' android/app/build.gradle.kts
          elif [ -f android/app/build.gradle ]; then
            sed -i 's/ndkVersion flutter.ndkVersion/ndkVersion "29.0.13113456"/' android/app/build.gradle
            sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 24/' android/app/build.gradle
            sed -i -E 's/^([[:space:]]*)compileSdkVersion[[:space:]]+.*/\1compileSdkVersion 36/' android/app/build.gradle
            grep -q 'compileSdkVersion 36' android/app/build.gradle || sed -i "/^android {/a\\    compileSdkVersion 36" android/app/build.gradle
            echo "-- resulting compileSdk line(s):"; grep -n 'compileSdkVersion' android/app/build.gradle
          else
            echo "Neither build.gradle.kts nor build.gradle found under android/app/" >&2
            exit 1
          fi

      - name: Add required permissions + Arabic app label to the generated AndroidManifest (flutter create's release manifest has NO permissions at all — INTERNET is needed for the one-time Whisper model download and google_fonts, RECORD_AUDIO + the RecognitionService query for live-mic ayah detection via speech_to_text)
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          grep -q 'android.permission.INTERNET' "$MANIFEST" || \
            sed -i 's|<application|<uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.RECORD_AUDIO"/>\n    <queries><intent><action android:name="android.speech.RecognitionService"/></intent></queries>\n    <application|' "$MANIFEST"
          sed -i 's|android:label="ayat_studio_app"|android:label="استوديو الآيات"|' "$MANIFEST"
          echo "-- resulting manifest:"; cat "$MANIFEST"

      - name: Decode release keystore from secrets (build silently stays on the debug key if secrets aren't set yet, so this doesn't block anyone before the one-time keystore setup is done)
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          if [ -n "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > android/app/release-keystore.jks
            cat > android/key.properties << PROPS
          storeFile=release-keystore.jks
          storePassword=$RELEASE_KEYSTORE_PASSWORD
          keyAlias=$RELEASE_KEY_ALIAS
          keyPassword=$RELEASE_KEY_PASSWORD
          PROPS
            echo "Release keystore decoded — build will be stably signed."
          else
            echo "RELEASE_KEYSTORE_BASE64 secret not set yet — falling back to the debug key for this build (Play Protect warning + no in-place updates until the one-time keystore secrets are added)."
          fi

      - name: Configure stable release signing (append-only — avoids depending on the exact default template text, which varies by Flutter version)
        run: |
          if [ -f android/app/build.gradle.kts ]; then
            if [ -f android/key.properties ]; then
              cat >> android/app/build.gradle.kts << 'GRADLE'

          // PATCH_S20_RELEASE_SIGNING -- stable keystore so every CI build
          // carries the same signing identity (see patch_s20 for why).
          run {
              val keyPropsFile = rootProject.file("key.properties")
              if (keyPropsFile.exists()) {
                  // PATCH_S22_FIX_JAVA_SHADOW -- avoid java.util.Properties/java.io.FileInputStream:
                  // AGP's `java { }` extension shadows the top-level `java` package name
                  // inside this script, so "java.util.Properties" resolves against that
                  // extension instead of the java.* package and fails to compile.
                  // Parse key.properties by hand instead -- sidesteps the name clash.
                  val propsMap = mutableMapOf<String, String>()
                  keyPropsFile.readLines().forEach { line ->
                      val idx = line.indexOf('=')
                      if (idx > 0) propsMap[line.substring(0, idx).trim()] = line.substring(idx + 1).trim()
                  }
                  android.signingConfigs.create("release") {
                      storeFile = file(propsMap["storeFile"] ?: "")
                      storePassword = propsMap["storePassword"]
                      keyAlias = propsMap["keyAlias"]
                      keyPassword = propsMap["keyPassword"]
                  }
                  android.buildTypes.getByName("release") {
                      signingConfig = android.signingConfigs.getByName("release")
                  }
              }
          }
          GRADLE
              echo "Release signingConfig appended."
            else
              echo "No android/key.properties (keystore secrets not set) — release build type keeps whatever signingConfig the default template gave it (the debug key)."
            fi
          else
            echo "This step only supports the Kotlin DSL (build.gradle.kts) — Groovy build.gradle not handled, signing stays on the debug key." >&2
          fi

      - name: Accept Android SDK licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null || true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Android launcher icon from real logo
        run: dart run flutter_launcher_icons

      - name: Build release APK
        run: |
          flutter build apk --release \
            --dart-define=MODEL_RELEASE_BASE_URL=https://github.com/${{ github.repository }}/releases/download/models

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ayat-studio-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
