name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: stable

      - name: Generate platform folders (android/ etc.) if missing
        run: flutter create --platforms=android --org com.ayatstudio --project-name ayat_studio_app .

      - name: Pin NDK version required by whisper_ggml, minSdk required by ffmpeg_kit_flutter_new v4.x
        run: |
          if [ -f android/app/build.gradle.kts ]; then
            sed -i 's/ndkVersion = flutter.ndkVersion/ndkVersion = "29.0.13113456"/' android/app/build.gradle.kts
            sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 24/' android/app/build.gradle.kts
          elif [ -f android/app/build.gradle ]; then
            sed -i 's/ndkVersion flutter.ndkVersion/ndkVersion "29.0.13113456"/' android/app/build.gradle
            sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 24/' android/app/build.gradle
          else
            echo "Neither build.gradle.kts nor build.gradle found under android/app/" >&2
            exit 1
          fi

      - name: Accept Android SDK licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null || true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Android launcher icon from real logo
        run: dart run flutter_launcher_icons

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ayat-studio-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
