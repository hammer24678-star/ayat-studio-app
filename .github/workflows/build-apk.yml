name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: stable

      - name: Generate platform folders (android/ etc.) if missing
        run: flutter create --platforms=android --org com.ayatstudio --project-name ayat_studio_app .

      - name: Diagnose root-level Android Gradle files (app-level compileSdk=36 doesn't propagate to plugin subprojects like file_picker — need to see the actual generated root build.gradle(.kts)/settings.gradle(.kts) before writing the subprojects-wide fix)
        run: |
          echo "=== android/ directory listing ==="
          ls -la android/
          echo
          echo "=== android/build.gradle.kts (if present) ==="
          cat android/build.gradle.kts 2>/dev/null || echo "NOT FOUND"
          echo
          echo "=== android/build.gradle (if present) ==="
          cat android/build.gradle 2>/dev/null || echo "NOT FOUND"
          echo
          echo "=== android/settings.gradle.kts (if present) ==="
          cat android/settings.gradle.kts 2>/dev/null || echo "NOT FOUND"
          echo
          echo "=== android/settings.gradle (if present) ==="
          cat android/settings.gradle 2>/dev/null || echo "NOT FOUND"

      - name: Dedupe ffmpeg-kit-full-gpl / ffmpeg-kit-min native libs (both bundle the same .so files, e.g. libavcodec.so, which Gradle's native-lib merge refuses to pick between on its own)
        run: |
          if [ -f android/app/build.gradle.kts ]; then
            sed -i '/^android {/a\    packaging { jniLibs { pickFirsts += "**/*.so" } }' android/app/build.gradle.kts
          elif [ -f android/app/build.gradle ]; then
            sed -i "/^android {/a\\    packagingOptions { jniLibs { pickFirsts += ['**/*.so'] } }" android/app/build.gradle
          else
            echo "Neither build.gradle.kts nor build.gradle found under android/app/" >&2
            exit 1
          fi

      - name: Exclude ffmpeg-kit-min transitive dependency (whisper_ggml pulls in ffmpeg_kit_flutter_new_min, which bundles the same com.antonkarpenko.ffmpegkit.* classes as our direct ffmpeg_kit_flutter_new full-gpl dependency — full-gpl is a superset, so it's safe to drop min)
        run: |
          if [ -f android/app/build.gradle.kts ]; then
            sed -i '/^android {/i\configurations.all { exclude(group = "com.antonkarpenko", module = "ffmpeg-kit-min") }' android/app/build.gradle.kts
          elif [ -f android/app/build.gradle ]; then
            sed -i "/^android {/i\\configurations.all { exclude group: 'com.antonkarpenko', module: 'ffmpeg-kit-min' }" android/app/build.gradle
          else
            echo "Neither build.gradle.kts nor build.gradle found under android/app/" >&2
            exit 1
          fi

      - name: Force compileSdk 36 across all Android plugin subprojects (flutter.compileSdkVersion resolves to android-34 in this Flutter SDK version but flutter_plugin_android_lifecycle requires >=36; app-level compileSdk only affects :app, not plugin subprojects like file_picker)
        run: |
          if ! grep -q 'FORCE_COMPILESDK_36' android/build.gradle.kts; then
            {
              echo ''
              echo '// FORCE_COMPILESDK_36 -- override compileSdk for every Android plugin subproject,'
              echo '// since flutter.compileSdkVersion resolves to android-34 in this Flutter SDK'
              echo '// version but flutter_plugin_android_lifecycle (pulled in transitively by'
              echo '// file_picker, permission_handler, etc.) requires >=36. App-level compileSdk'
              echo '// in android/app/build.gradle.kts only affects :app, not plugin subprojects.'
              echo 'subprojects {'
              echo '    afterEvaluate {'
              echo '        extensions.findByType(com.android.build.gradle.BaseExtension::class.java)?.let { ext ->'
              echo '            ext.compileSdkVersion(36)'
              echo '        }'
              echo '    }'
              echo '}'
            } >> android/build.gradle.kts
          fi
          echo "-- tail of android/build.gradle.kts:"
          tail -20 android/build.gradle.kts

      - name: Pin NDK version required by whisper_ggml, minSdk required by ffmpeg_kit_flutter_new v4.x, compileSdk 36 required by flutter_plugin_android_lifecycle
        run: |
          if [ -f android/app/build.gradle.kts ]; then
            sed -i 's/ndkVersion = flutter.ndkVersion/ndkVersion = "29.0.13113456"/' android/app/build.gradle.kts
            sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 24/' android/app/build.gradle.kts
            sed -i -E 's/^([[:space:]]*)compileSdk[[:space:]]*=.*/\1compileSdk = 36/' android/app/build.gradle.kts
            grep -q 'compileSdk = 36' android/app/build.gradle.kts || sed -i '/^android {/a\    compileSdk = 36' android/app/build.gradle.kts
            echo "-- resulting compileSdk line(s):"; grep -n 'compileSdk' android/app/build.gradle.kts
          elif [ -f android/app/build.gradle ]; then
            sed -i 's/ndkVersion flutter.ndkVersion/ndkVersion "29.0.13113456"/' android/app/build.gradle
            sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 24/' android/app/build.gradle
            sed -i -E 's/^([[:space:]]*)compileSdkVersion[[:space:]]+.*/\1compileSdkVersion 36/' android/app/build.gradle
            grep -q 'compileSdkVersion 36' android/app/build.gradle || sed -i "/^android {/a\\    compileSdkVersion 36" android/app/build.gradle
            echo "-- resulting compileSdk line(s):"; grep -n 'compileSdkVersion' android/app/build.gradle
          else
            echo "Neither build.gradle.kts nor build.gradle found under android/app/" >&2
            exit 1
          fi

      - name: Accept Android SDK licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null || true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Android launcher icon from real logo
        run: dart run flutter_launcher_icons

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ayat-studio-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
